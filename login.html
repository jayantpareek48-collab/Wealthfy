<!DOCTYPE html>
<html>
<head>
    <title>Login - Wealthfy</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(120deg, #0b3d91, #00c6ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background: #0b3d91;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #072b66;
        }

        a {
            display: block;
            margin-top: 10px;
            color: #0b3d91;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Wealthfy Login</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <a href="index.html">← Back to Home</a>
</div>

<script>
function login() {
    alert("Login system is demo only. Backend coming soon 🚀");
}
</script>

</body>
</html>
