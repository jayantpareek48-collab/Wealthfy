<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wealthfy Elite - Learn. Invest. Grow.</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Background Orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <header class="container shell">
    <h1 class="title">Wealthfy Elite</h1>
    <p class="subtitle">Learn. Invest. Grow.</p>
  </header>

  <main class="container layout">
    <!-- Auth -->
    <section class="glass-card panel">
      <h2 class="panel-title">Account (Demo)</h2>
      <div class="stack">
        <input id="email" class="field" type="email" placeholder="Email" />
        <input id="password" class="field" type="password" placeholder="Password" />
        <div class="btn-row">
          <button id="signupBtn" class="btn btn-primary">Sign Up</button>
          <button id="loginBtn" class="btn btn-blue">Login</button>
          <button id="logoutBtn" class="btn btn-outline">Logout</button>
        </div>
        <p id="userStatus" class="muted">Demo mode</p>
      </div>
    </section>

    <!-- SIP Calculator -->
    <section class="glass-card panel">
      <h2 class="panel-title">SIP Calculator</h2>
      <div class="stack">
        <input id="amount" type="number" class="field" placeholder="Monthly Investment (₹)" value="5000" />
        <input id="rate" type="number" class="field" placeholder="Expected Return (%)" value="12" />
        <input id="years" type="number" class="field" placeholder="Years" value="10" />
        <button id="calcBtn" class="btn btn-primary">Calculate</button>
        <p id="result" class="muted"></p>
        <canvas id="sipChart" class="mt-4" style="max-height: 240px;"></canvas>
      </div>
    </section>

    <!-- Quiz Arena -->
    <section class="glass-card panel panel-wide">
      <div class="panel-head">
        <h2 class="panel-title">Quiz Arena</h2>
        <p id="quizMeta" class="muted">Choose a level</p>
      </div>
      
      <div id="levelsGrid" class="levels-grid"></div>

      <div id="quizSection" class="quiz-shell hidden">
        <div class="progress-track">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <p id="progressText" class="muted"></p>
        <h3 id="questionText" class="mb-4"></h3>
        <div id="optionsWrap" class="options"></div>
        <div class="btn-row">
          <button id="nextBtn" class="btn btn-blue" disabled>Next</button>
          <button id="quitBtn" class="btn btn-outline">Quit</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Popup -->
  <div id="popup" class="popup glass-card">
    <p>Welcome to Wealthfy Elite! Start your journey 🚀</p>
    <button id="closePopupBtn" class="btn btn-outline btn-sm">Close</button>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="script.js" defer></script>
</body>
</html>
