<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wealthfy Elite - Finance Quiz</title>

  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase (compat for your JS) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>

<body>

<!-- Background -->
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<header class="container shell">
  <h1 class="title">Wealthfy Elite</h1>
  <p class="subtitle">Learn. Invest. Grow.</p>
</header>

<main class="container layout">

  <!-- AUTH -->
  <section class="glass-card panel">
    <h2 class="panel-title">Account</h2>
    <div class="stack">
      <input id="email" class="field" type="email" placeholder="Email" required autocomplete="email"/>
      <input id="password" class="field" type="password" placeholder="Password" required autocomplete="current-password"/>

      <div class="btn-row">
        <button type="button" id="signupBtn" class="btn btn-primary">Sign Up</button>
        <button type="button" id="loginBtn" class="btn btn-blue">Login</button>
        <button type="button" id="logoutBtn" class="btn btn-outline">Logout</button>
      </div>

      <p id="userStatus" class="muted">Not logged in</p>
    </div>
  </section>

  <!-- SIP -->
  <section class="glass-card panel">
    <h2 class="panel-title">SIP Calculator</h2>
    <div class="stack">
      <input id="amount" type="number" class="field" placeholder="Monthly amount" required/>
      <input id="rate" type="number" class="field" placeholder="Return (%)" required/>
      <input id="years" type="number" class="field" placeholder="Years" required/>

      <button type="button" id="calcBtn" class="btn btn-primary">Calculate</button>
      <p id="result" class="muted"></p>
    </div>
  </section>

  <!-- QUIZ -->
  <section class="glass-card panel panel-wide">
    <div class="panel-head">
      <h2 class="panel-title">Quiz Arena</h2>
      <p id="quizMeta" class="muted">Choose a level</p>
    </div>

    <div id="levelsGrid" class="levels-grid"></div>

    <div id="quizSection" class="quiz-shell hidden">
      <div class="progress-track">
        <div id="progressFill" class="progress-fill"></div>
      </div>

      <p id="progressText" class="muted"></p>
      <h3 id="questionText"></h3>

      <div id="optionsWrap" class="options"></div>

      <div class="btn-row">
        <button type="button" id="nextBtn" class="btn btn-blue" disabled>Next</button>
        <button type="button" id="quitBtn" class="btn btn-outline">Quit</button>
      </div>
    </div>
  </section>

</main>

<!-- POPUP -->
<div id="popup" class="popup glass-card">
  <p>Start your financial journey 🚀</p>
  <button type="button" id="closePopupBtn" class="btn btn-outline btn-sm">Close</button>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- MODAL -->
<div id="discountModal" class="modal-backdrop hidden">
  <div class="modal-card glass-card">
    <h3>Level 2 Unlocked 🎉</h3>
    <p>Claim your reward</p>
    <div class="btn-row">
      <button type="button" id="claimOfferBtn" class="btn btn-primary">Claim</button>
      <button type="button" id="closeModalBtn" class="btn btn-outline">Close</button>
    </div>
  </div>
</div>

<!-- JS (defer is IMPORTANT) -->
<script src="script.js" defer></script>

</body>
</html>
