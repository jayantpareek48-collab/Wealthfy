<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wealthfy Elite</title>

  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>

<body>

<header class="container">
  <h1 class="title">Wealthfy Elite</h1>
  <p class="subtitle">Learn. Invest. Grow.</p>
</header>

<main class="container layout">

  <!-- AUTH -->
  <section class="glass-card panel">
    <h2>Account</h2>
    <input id="email" class="field" placeholder="Email"/>
    <input id="password" class="field" type="password" placeholder="Password"/>

    <div class="btn-row">
      <button id="signupBtn" class="btn btn-primary">Sign Up</button>
      <button id="loginBtn" class="btn btn-blue">Login</button>
      <button id="logoutBtn" class="btn btn-outline">Logout</button>
    </div>

    <p id="userStatus" class="muted">Not logged in</p>
  </section>

  <!-- SIP -->
  <section class="glass-card panel">
    <h2>SIP Calculator</h2>
    <input id="amount" class="field" placeholder="Monthly amount"/>
    <input id="rate" class="field" placeholder="Return (%)"/>
    <input id="years" class="field" placeholder="Years"/>

    <button id="calcBtn" class="btn btn-primary">Calculate</button>
    <p id="result" class="muted"></p>
  </section>

  <!-- QUIZ -->
  <section class="glass-card panel panel-wide">
    <h2>Quiz</h2>

    <div id="levelsGrid"></div>

    <div id="quizSection" class="hidden">
      <div class="progress">
        <div id="progressFill"></div>
      </div>

      <p id="progressText"></p>
      <h3 id="questionText"></h3>

      <div id="optionsWrap"></div>

      <button id="nextBtn" class="btn btn-blue">Next</button>
      <button id="quitBtn" class="btn btn-outline">Quit</button>
    </div>
  </section>

</main>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="script.js"></script>
</body>
</html>
