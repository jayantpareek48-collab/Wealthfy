<!DOCTYPE html>
<html>
<head>
<title>Wealthfy SaaS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input,button{
  padding:10px;
  margin:5px;
  width:250px;
  border-radius:8px;
  border:none;
}

button{
  background:#38bdf8;
  cursor:pointer;
}

.dashboard{
  display:none;
  padding:20px;
}

.card{
  background:#111a2e;
  padding:15px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="auth">

<h2>Wealthfy SaaS Login</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dash">

<h2>Welcome <span id="user"></span></h2>
<button onclick="logout()">Logout</button>

<div class="card">
<h3>SIP Calculator</h3>
<input id="p" placeholder="Monthly Investment">
<input id="r" placeholder="Return %">
<input id="t" placeholder="Years">
<button onclick="saveSIP()">Save SIP</button>
</div>

<div class="card">
<h3>Your Saved Data</h3>
<button onclick="loadData()">Load Data</button>
<div id="data"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "wealthfy-59f90"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* SIGNUP */
window.signup = function(){
createUserWithEmailAndPassword(auth,email.value,pass.value)
.then(()=>alert("Account Created"))
.catch(e=>alert(e.message));
}

/* LOGIN */
window.login = function(){
signInWithEmailAndPassword(auth,email.value,pass.value)
.then(u=>{
showDash(u.user.email);
})
.catch(e=>alert("Wrong login"));
}

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
if(user){
showDash(user.email);
}
});

/* SHOW DASH */
function showDash(email){
document.getElementById("auth").style.display="none";
document.getElementById("dash").style.display="block";
document.getElementById("user").innerText=email;
}

/* SAVE DATA (SaaS FEATURE) */
window.saveSIP = async function(){
const user = auth.currentUser;

if(!user) return;

await setDoc(doc(db,"users",user.email),{
sip:{
p:p.value,
r:r.value,
t:t.value
}
});

alert("Saved to Cloud");
}

/* LOAD DATA */
window.loadData = async function(){
const user = auth.currentUser;

const snap = await getDoc(doc(db,"users",user.email));

if(snap.exists()){
data.innerText = JSON.stringify(snap.data(),null,2);
}
}

/* LOGOUT */
window.logout = function(){
signOut(auth);
location.reload();
}

</script>

</body>
</html>
