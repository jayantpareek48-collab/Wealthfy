<!DOCTYPE html>
<html>
<head>
    <title>Wealthfy</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f8fb;
        }

        /* NAVBAR */
        .navbar {
            background: #0b3d91;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
        }

        .nav-left a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
        }

        /* LOGIN BUTTON (PRO LOOK) */
        .login-btn {
            background: white;
            color: #0b3d91;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #e6f0ff;
        }

        /* HERO SECTION */
        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            color: #0b3d91;
            font-size: 40px;
        }

        .hero p {
            color: #444;
        }

        .btn {
            background: #0b3d91;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-left">
        <a href="#">Home</a>
        <a href="#about">About</a>
        <a href="#features">Features</a>
    </div>

    <a href="login.html" class="login-btn">Login</a>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Wealthfy 🚀</h1>
    <p>Learn Finance • Play Stock Games • Build Money Skills</p>
    <a class="btn" href="#features">Start Learning</a>
</div>

</body>
</html>
