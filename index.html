<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealthfy.in</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#0A0F1E] text-white font-[Inter]">

<!-- NAVBAR -->
<nav class="flex justify-between items-center p-5 glass">
    <h1 class="text-xl font-semibold text-[#00F5FF]">Wealthfy</h1>
    <div class="space-x-6">
        <a href="#">Learn</a>
        <a href="#tools">Tools</a>
        <a href="#quiz">Quiz</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- HERO -->
<section class="text-center py-12">
    <h1 class="text-4xl font-bold mb-4">Master Your Financial Future</h1>
    <p class="text-gray-400">Smart tools + gamified learning</p>
</section>

<!-- TOOLS GRID -->
<section id="tools" class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    <!-- SIP CALCULATOR -->
    <div class="glass p-5">
        <h2 class="text-xl mb-3 text-[#00F5FF]">SIP Calculator</h2>

        <input id="sipAmount" type="number" placeholder="Monthly Investment" class="input">
        <input id="sipRate" type="number" placeholder="Return Rate (%)" class="input">
        <input id="sipTime" type="number" placeholder="Years" class="input">

        <button onclick="calculateSIP()" class="btn">Calculate</button>

        <p id="sipResult" class="mt-3 text-sm"></p>
    </div>

    <!-- SAVINGS GRAPH -->
    <div class="glass p-5 col-span-1 md:col-span-2">
        <h2 class="text-xl mb-3 text-[#00F5FF]">Savings Growth</h2>

        <input id="saveAmount" type="number" placeholder="Monthly Savings" class="input">
        <input id="saveYears" type="number" placeholder="Years" class="input">

        <button onclick="generateGraph()" class="btn">Generate Graph</button>

        <canvas id="chartCanvas" class="mt-4"></canvas>
    </div>

</section>

<!-- QUIZ -->
<section id="quiz" class="p-6">
    <div class="glass p-5">
        <h2 class="text-xl mb-3 text-[#00F5FF]">Finance Quiz</h2>

        <div id="quizContainer"></div>

        <button onclick="submitQuiz()" class="btn mt-3">Submit</button>

        <p id="quizResult" class="mt-3"></p>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
