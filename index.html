<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wealthfy</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lottie-web@5.12.2/build/player/lottie.min.js"></script>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">₹ Wealthfy</div>
</div>

<!-- HERO -->
<section class="hero">

  <div class="hero-text">
    <h1>Build Wealth. Smarter.</h1>
    <p>Simple tools for SIP, goals & savings — built for India 🇮🇳</p>
    <button onclick="scrollToTools()">Explore Tools</button>
  </div>

  <!-- FIXED: ID must match JS -->
  <div id="lottie-animation"></div>

</section>

<!-- TOOLS -->
<section id="tools" class="cards">

  <div class="card" onclick="openTool('sip')">
    <h3>📈 SIP Calculator</h3>
  </div>

  <div class="card" onclick="openTool('goal')">
    <h3>🎯 Goal Planner</h3>
  </div>

  <div class="card" onclick="openTool('saving')">
    <h3>💰 Saving Planner</h3>
  </div>

</section>

<!-- TOOL SECTION -->
<section id="toolSection" class="tool-section" style="display:none;">

  <button class="back" onclick="closeTool()">← Back</button>

  <!-- SIP -->
  <div id="sip" class="tool" style="display:none;">
    <h2>SIP Calculator</h2>

    <input id="sipAmount" type="number" placeholder="Monthly ₹">
    <input id="sipRate" type="number" placeholder="Return %">
    <input id="sipYears" type="number" placeholder="Years">

    <button onclick="calcSIP()">Check Value</button>
    <p id="sipResult"></p>
  </div>

  <!-- GOAL -->
  <div id="goal" class="tool" style="display:none;">
    <h2>Goal Planner</h2>

    <input id="goalAmount" type="number" placeholder="Target ₹">
    <input id="goalYears" type="number" placeholder="Years">

    <button onclick="calcGoal()">Check Plan</button>
    <p id="goalResult"></p>
  </div>

  <!-- SAVING -->
  <div id="saving" class="tool" style="display:none;">
    <h2>Saving Planner</h2>

    <input id="income" type="number" placeholder="Monthly Income ₹">
    <input id="expense" type="number" placeholder="Monthly Expenses ₹">

    <button onclick="calcSaving()">Check Saving</button>
    <p id="savingResult"></p>
  </div>

  <!-- CHART -->
  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>

</section>

<!-- AI BADGE -->
<div class="ai-badge">
  🤖 AI Wealth Advisor Coming Soon
</div>

<!-- SCRIPT -->
<script src="script.js"></script>

<!-- INLINE FIXES (IMPORTANT) -->
<script>
function scrollToTools() {
  document.getElementById("tools").scrollIntoView({
    behavior: "smooth"
  });
}

/* Tool Navigation */
function openTool(toolId) {
  document.getElementById("toolSection").style.display = "block";

  document.querySelectorAll(".tool").forEach(t => {
    t.style.display = "none";
  });

  document.getElementById(toolId).style.display = "block";
}

function closeTool() {
  document.getElementById("toolSection").style.display = "none";
}

/* Lottie Animation FIX */
lottie.loadAnimation({
  container: document.getElementById('lottie-animation'),
  renderer: 'svg',
  loop: true,
  autoplay: true,
  path: 'https://assets2.lottiefiles.com/packages/lf20_qp1q7mct.json'
});

/* Chart FIX */
const ctx = document.getElementById('chart');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Year 1', 'Year 2', 'Year 3', 'Year 4', 'Year 5'],
    datasets: [{
      label: 'Growth (₹)',
      data: [10000, 25000, 50000, 80000, 120000],
      borderWidth: 2,
      tension: 0.4
    }]
  },
  options: {
    responsive: true
  }
});
</script>

</body>
</html>
